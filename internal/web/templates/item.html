{{define "title"}}{{.Title}} — WatchTrail{{end}}
{{define "content"}}
<p class="back"><a href="/">&larr; Recent</a></p>

<article class="media-card{{if not .Thumbnail}} no-art{{end}}">
  {{if .Thumbnail}}
  <a class="art" href="{{.Link}}" target="_blank" rel="noopener noreferrer" aria-label="Watch {{.Title}}">
    <img src="{{.Thumbnail}}" alt="" loading="lazy" decoding="async"
         onerror="this.closest('.media-card').classList.add('no-art');this.remove();">
    <span class="scrim" aria-hidden="true"></span>
    <span class="play" aria-hidden="true"></span>
  </a>
  {{end}}
  <div class="meta">
    <div class="tags">
      <span class="badge">{{sourceBadge .SourceKind}}</span>
    </div>
    <h1>{{.Title}} <small>{{.Kind}}</small></h1>
    <div class="actions">
      {{if .Link}}
      <a class="watch" href="{{.Link}}" target="_blank" rel="noopener noreferrer">{{.LinkLabel}} <span class="arr" aria-hidden="true">↗</span></a>
      {{end}}
      <form class="delete" method="post" action="/item/{{.ID}}/delete"
            hx-post="/item/{{.ID}}/delete"
            hx-confirm="Delete this item and all its watch history?">
        <button type="submit">Delete</button>
      </form>
    </div>
  </div>
</article>

{{template "item_detail" .}}
<script>
(function () {
  if (!window.EventSource) return;
  var ID = {{.ID}};
  var t, es = new EventSource('/events');
  es.addEventListener('update', function (e) {
    if (e.data !== ID) return;
    clearTimeout(t);
    t = setTimeout(function () {
      window.htmx && htmx.ajax('GET', '/item/' + encodeURIComponent(ID),
        { target: '#item-detail', swap: 'outerHTML' });
    }, 300);
  });
})();
</script>
{{end}}
