<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="ui.css" />
    </head>
    <body class="popup">
        <header class="bar">
            <span class="brand">watch<b>·</b>trail</span>
            <label class="switch"
                ><input type="checkbox" id="enabled" /><span
                    class="slider"
                ></span
            ></label>
        </header>

        <div class="pill" id="pill">
            <span class="dot"></span><span id="pillText">Checking…</span>
        </div>

        <div class="card">
            <div class="host" id="host"></div>
            <button class="btn primary" id="track">Track this site</button>
            <button class="btn danger" id="stop" hidden>Stop tracking</button>
        </div>

        <div class="inline-status" id="status"></div>

        <a href="#" class="settings-link" id="settings">Settings →</a>

        <script src="popup.js"></script>
    </body>
</html>
